apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Values.namespace }}-postgres-pv
spec:
  capacity:
    storage: {{ .Values.postgres.storage }}
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: {{ .Values.postgres.storageClassName }}
  hostPath:
    path: {{ .Values.postgres.hostPath }}