apiVersion: v2
appVersion: v1.145.0
dependencies:
- name: victoria-metrics-common
  repository: oci://ghcr.io/victoriametrics/helm-charts
  version: 0.3.*
- condition: victoria-metrics-operator.enabled
  name: victoria-metrics-operator
  repository: oci://ghcr.io/victoriametrics/helm-charts
  version: 0.63.*
- condition: kube-state-metrics.enabled
  name: kube-state-metrics
  repository: oci://ghcr.io/prometheus-community/charts
  version: 7.3.*
- condition: prometheus-node-exporter.enabled
  name: prometheus-node-exporter
  repository: oci://ghcr.io/prometheus-community/charts
  version: 4.55.*
- condition: grafana.enabled
  name: grafana
  repository: oci://ghcr.io/grafana-community/helm-charts
  version: 12.3.*
description: Kubernetes monitoring on VictoriaMetrics stack. Includes VictoriaMetrics
  Operator, Grafana dashboards, ServiceScrapes and VMRules
home: https://github.com/VictoriaMetrics/helm-charts
icon: https://avatars.githubusercontent.com/u/43720803?s=200&v=4
keywords:
- victoriametrics
- operator
- monitoring
- kubernetes
- observability
- tsdb
- metrics
- metricsql
- timeseries
kubeVersion: '>=1.25.0-0'
name: victoria-metrics-k8s-stack
sources:
- https://github.com/VictoriaMetrics/helm-charts
type: application
version: 0.82.0
