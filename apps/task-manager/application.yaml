apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: task-manager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://192.168.180.5/i.sharafi/ctesiphon-k8s-gitops
    targetRevision: HEAD
    path: charts/task-manager
    helm:
      valueFiles:
        - ../../config/task-manager/values.yaml        
  destination:
    server: https://kubernetes.default.svc
    namespace: task-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true