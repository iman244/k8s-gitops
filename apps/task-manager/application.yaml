apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: task-manager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/iman244/ctesiphon-k8s-gitops.git
    targetRevision: HEAD
    path: charts/task-manager
    helm:
      valuesObject:
        namespace: task-manager
        httproute:
          frontend:
            hostname: task-manager.golden-horde.ir
          backend:
            hostname: task-manager-backend.golden-horde.ir
  destination:
    server: https://kubernetes.default.svc
    namespace: task-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true