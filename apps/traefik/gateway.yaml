apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: traefik-gateway
  namespace: traefik
spec:
  gatewayClassName: traefik
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https-argocd
      port: 443
      protocol: HTTPS
      hostname: argocd.golden-horde.ir
      tls:
        mode: Terminate
        certificateRefs:
          - name: argocd-tls
            namespace: traefik
      allowedRoutes:
        namespaces:
          from: All