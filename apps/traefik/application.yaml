apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/iman244/k8s-gitops.git
    targetRevision: HEAD
    path: charts/traefik
    helm:
      valuesObject:
        deployment:
          replicas: 1
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
        service:
          type: LoadBalancer
          loadBalancerIP: 87.248.156.185
        ports:
          web:
            port: 80
            exposedPort: 80
          websecure:
            port: 443
            exposedPort: 443
        ingressRoute:
          dashboard:
            enabled: false
        logs:
          general:
            level: INFO
        providers:
          kubernetesGateway:
            enabled: true
        gateway:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true