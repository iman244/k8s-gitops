apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-task-manager
  namespace: traefik
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: task-manager
  to:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway