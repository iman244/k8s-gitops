apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-metrics-stack-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/iman244/ctesiphon-k8s-gitops
    targetRevision: HEAD
    path: config/victoria-metrics-k8s-stack
  destination:
    server: https://kubernetes.default.svc
    namespace: victoria-metrics-stack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true