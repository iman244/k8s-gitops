apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: task-manager
  namespace: argocd
spec:
  writeBackConfig:
    method: "git:secret:argocd/argocd-image-updater-secret"
    gitConfig:
      branch: "main"
      writeBackTarget: "helmvalues:/config/task-manager/values.yaml"
  applicationRefs:
    - namePattern: task-manager
      images:
        - alias: backend
          imageName: iman244/task-manager-fastapi
          commonUpdateSettings:
            updateStrategy: semver
            allowTags: "regexp:^v[0-9]+\\.[0-9]+\\.[0-9]+$"
          manifestTargets:
            helm:
              name: backend.image.repository
              tag: backend.image.tag
        - alias: frontend
          imageName: iman244/task-manager-nextjs
          commonUpdateSettings:
            updateStrategy: semver
            allowTags: "regexp:^v[0-9]+\\.[0-9]+\\.[0-9]+$"
          manifestTargets:
            helm:
              name: frontend.image.repository
              tag: frontend.image.tag