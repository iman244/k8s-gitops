namespace: task-manager
backend:
  image:
    repository: iman244/task-manager-fastapi
    tag: v1.0.1
  port: 8000
  allowedOrigins: '["http://task-manager.golden-horde.ir"]'
  replicas: 2
  resources:
    requests:
      cpu: 15m
      memory: 210Mi
    limits:
      cpu: 150m
      memory: 320Mi
frontend:
  image:
    repository: iman244/task-manager-nextjs
    tag: v1.0.3
  port: 3000
  apiUrl: http://backend:8000
  replicas: 2
  resources:
    requests:
      cpu: 25m
      memory: 280Mi
    limits:
      cpu: 150m
      memory: 400Mi
postgres:
  image:
    repository: postgres
    tag: "18"
  port: 5432
  replicas: 2
  storage: 2Gi
  storageClassName: manual
  hostPath: /kubernetes-volumes/task-manager/postgres
  pgdata: /var/lib/postgresql/data/pgdata
  resources:
    requests:
      cpu: 50m
      memory: 180Mi
    limits:
      cpu: 200m
      memory: 300Mi
redis:
  image:
    repository: redis
    tag: "8.8"
  port: 6379
  replicas: 2
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
secret:
  name: task-manager-secrets-external
gateway:
  name: traefik-gateway
  namespace: traefik
  sectionName: http
httproute:
  frontend:
    hostname: task-manager.golden-horde.ir
  backend:
    hostname: task-manager-backend.golden-horde.ir
