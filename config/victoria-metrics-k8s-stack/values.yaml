nameOverride: "vmks"


vmsingle:
  spec:
    storage:
      resources:
        requests:
          storage: 2Gi

grafana:
  admin:
    existingSecret: "grafana-admin-secret"
    userKey: admin-user
    passwordKey: admin-password
  initChownData:
    enabled: false


  sidecar:
    dashboards:
      enabled: false
    datasources:
      enabled: false
      
  persistence:
    enabled: true
    type: pvc
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 2Gi
    existingClaim: grafana-pvc

defaultDashboards:
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true

extraObjects:
  - apiVersion: v1
    kind: Service
    metadata:
      name: vmsingle-nodeport
      namespace: victoria-metrics-stack
    spec:
      type: NodePort
      selector:
        app.kubernetes.io/name: vmsingle
        app.kubernetes.io/instance: victoria-metrics-stack-vmks
      ports:
        - port: 8428
          targetPort: 8428
          nodePort: 32428

  - apiVersion: v1
    kind: Service
    metadata:
      name: vmagent-nodeport
      namespace: victoria-metrics-stack
    spec:
      type: NodePort
      selector:
        app.kubernetes.io/name: vmagent
        app.kubernetes.io/instance: victoria-metrics-stack-vmks
      ports:
        - port: 8429
          targetPort: 8429
          nodePort: 32429

  - apiVersion: v1
    kind: Service
    metadata:
      name: vmalert-nodeport
      namespace: victoria-metrics-stack
    spec:
      type: NodePort
      selector:
        app.kubernetes.io/name: vmalert
        app.kubernetes.io/instance: victoria-metrics-stack-vmks
      ports:
        - port: 8080
          targetPort: 8080
          nodePort: 32080

  - apiVersion: v1
    kind: Service
    metadata:
      name: grafana-nodeport
      namespace: victoria-metrics-stack
    spec:
      type: NodePort
      selector:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/instance: victoria-metrics-stack
      ports:
        - port: 80
          targetPort: 3000
          nodePort: 32000