nameOverride: "vmks"

vmsingle:
  spec:
    storage:
      resources:
        requests:
          storage: 2Gi
grafana:
  admin:
    existingSecret: "grafana-admin-secret"
    userKey: admin-user
    passwordKey: admin-password
  initChownData:
    enabled: false
  grafana.ini:
    server:
      root_url: "https://grafana.golden-horde.ir"

  persistence:
    enabled: true
    type: pvc
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 2Gi
    existingClaim: grafana-pvc

defaultDashboards:
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true